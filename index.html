<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIDF 2026 – Student Performer Pack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F2EDE4;color:#1A1A1A;min-height:100vh}
.hdr{background:#1E1B18;padding:22px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-logo{font-size:13px;font-weight:800;color:#C4581A;letter-spacing:2px;text-transform:uppercase}
.hdr-title{font-size:18px;font-weight:700;color:#fff;margin-top:4px}
.hdr-sub{font-size:12px;color:#AAAAAA;margin-top:2px}
.hdr-badge{background:#C4581A;color:#fff;font-size:10px;font-weight:800;padding:5px 13px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.nav{background:#fff;border-bottom:2px solid #E5DDD3;padding:0 32px;display:flex;gap:2px;overflow-x:auto;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-btn{background:none;border:none;color:#6B6B6B;padding:15px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap;font-family:inherit}
.nav-btn:hover{color:#1A1A1A;border-bottom-color:#D5CCC2}
.nav-btn.active{color:#1A1A1A;border-bottom-color:#C4581A;font-weight:700}
.content{max-width:1100px;margin:0 auto;padding:28px 32px}
.sec-title{font-size:21px;font-weight:700;color:#1A1A1A;margin-bottom:5px}
.sec-sub{font-size:13px;color:#6B6B6B;margin-bottom:22px}
/* group selector */
.grp-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.grp-btn{background:#fff;border:2px solid #D5CCC2;color:#333;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.grp-btn:hover{border-color:#C4581A;color:#C4581A}
.grp-btn.active{color:#fff;border-color:transparent}
/* table */
.table-wrap{background:#fff;border:1px solid #E5DDD3;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#F8F4EF;color:#6B6B6B;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 14px;text-align:left;border-bottom:1px solid #E5DDD3}
td{padding:11px 14px;border-bottom:1px solid #F5F0E8;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.num{font-size:17px;font-weight:700}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin:1px}
.chip-solo{background:#FEF0E8;color:#C4581A}
.chip-group{background:#E8F4F0;color:#2D6A4F}
.chip-all{background:#EDF5F1;color:#2D6A4F}
.star{color:#C4581A}
/* highlighted row for selected group */
tr.hl{position:relative}
tr.hl td{background:#FEF6EF}
tr.hl td:first-child{border-left:5px solid #C4581A;padding-left:10px}
.your-badge{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
/* info grid */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.info-card{background:#fff;border:2px solid #E5DDD3;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ic-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6B6B6B;margin-bottom:6px}
.ic-val{font-size:21px;font-weight:700;color:#1A1A1A}
.ic-sub{font-size:12px;color:#999999;margin-top:3px}
/* timeline */
.tl{position:relative;padding-left:28px}
.tl::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:#E5DDD3}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-24px;top:4px;width:10px;height:10px;border-radius:50%;background:#4A7C59;border:2px solid #F2EDE4}
.tl-dot.gold{background:#C4581A}
.tl-dot.brk{background:#C8BFB4}
.tl-dot.show{background:#C4581A;width:13px;height:13px;left:-26px;box-shadow:0 0 10px rgba(196,88,26,.35)}
.tl-time{font-size:12px;font-weight:700;color:#4A7C59;margin-bottom:2px}
.tl-lbl{font-size:14px;font-weight:600;color:#1A1A1A}
.tl-note{font-size:11px;color:#999999;margin-top:2px}
/* checklist */
.check-section{margin-bottom:26px}
.check-heading{font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.check-heading-icon{font-size:18px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#fff;border:1px solid #E5DDD3;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.check-item:hover{background:#F8F4EF}
.check-item input[type=checkbox]{width:17px;height:17px;accent-color:#C4581A;flex-shrink:0;margin-top:1px;cursor:pointer}
.check-item label{font-size:13px;color:#1A1A1A;cursor:pointer;line-height:1.4}
.check-item.done label{text-decoration:line-through;color:#999999}
/* venue / floor plans */
.venue-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
@media(max-width:680px){.venue-grid{grid-template-columns:1fr}}
.floor-card{background:#fff;border:2px solid #E5DDD3;border-radius:10px;padding:20px}
.floor-title{font-size:12px;font-weight:800;color:#1A1A1A;margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.floor-title span{background:#1E1B18;color:#C4581A;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.5px}
.fp{display:flex;flex-direction:column;gap:6px}
.fp-room{border-radius:7px;padding:11px 14px;font-size:12px;font-weight:600;line-height:1.5}
.fp-room small{font-weight:400;font-size:11px;color:#6B6B6B;display:block;margin-top:1px}
.fp-row{display:flex;gap:6px}
.fp-row .fp-room{flex:1}
.fp-backstage{background:#F5F0E8;border:1.5px solid #D5CCC2;color:#1A1A1A;text-align:center}
.fp-stage{background:#1E1B18;color:#C4581A;text-align:center;border:1.5px solid #1E1B18}
.fp-stage small{color:#AAAAAA}
.fp-audience{background:#F8F4EF;border:1.5px dashed #D5CCC2;color:#6B6B6B;text-align:center;font-style:italic;font-weight:400;font-size:11px;padding:8px 14px}
.fp-main{background:#EDF5F1;border:2px solid #86CFAC;color:#1A4731}
.fp-main small{color:#2D6A4F}
.fp-small{background:#F8F4EF;border:1.5px solid #D5CCC2;color:#1A1A1A}
.fp-small small{color:#6B6B6B}
.fp-toilet{background:#EFF6FF;border:1.5px solid #BAD6F5;color:#1D4ED8;text-align:center}
.fp-wings{background:#FEF6EF;border:1.5px solid #F4C9A0;color:#92400E;text-align:center;font-size:11px;padding:7px 14px}
.fp-label{font-size:10px;color:#999999;text-align:center;margin-top:2px;font-style:italic}
/* alert */
.alert{padding:13px 16px;border-radius:8px;margin-bottom:18px;font-size:13px;line-height:1.6}
.alert-gold{background:#FEF6EF;border-left:4px solid #C4581A;color:#7A3010}
.alert-purple{background:#F8F4EF;border-left:4px solid #D5CCC2;color:#333}
.rule-list{margin:0;padding-left:18px}
.rule-list li{margin-bottom:4px}
/* closing */
.closing{background:#1E1B18;border-radius:12px;padding:28px;color:#E8E0D8;text-align:center;margin-top:8px}
.closing h3{color:#C4581A;font-size:17px;margin-bottom:10px}
.closing p{font-size:14px;line-height:1.7;color:#AAAAAA}
.closing .sig{margin-top:14px;font-weight:700;color:#fff;font-size:14px}
/* ── Important Notes ─────────────────────────────────── */
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:4px 0 16px}
@media(max-width:600px){.notes-grid{grid-template-columns:1fr}}
.notes-card{border-radius:12px;padding:16px 18px;border:1px solid rgba(0,0,0,.07)}
.notes-card-icon{font-size:22px;margin-bottom:8px}
.notes-card-title{font-weight:700;font-size:14px;color:#1A1A1A;margin-bottom:6px}
.notes-card-body{font-size:13px;color:#333333;line-height:1.55}
.notes-list{margin:8px 0 0 16px;padding:0}
.notes-list li{margin-bottom:4px}
.notes-card-gold{background:#FEF8EE;border-color:#F0C888}
.notes-card-purple{background:#F8F4EF;border-color:#D5CCC2}
.notes-card-teal{background:#E6F7F4;border-color:#8ECFC7}
.notes-card-green{background:#EDF5F1;border-color:#86CFAC}
.notes-card-orange{background:#FEF6EF;border-color:#F4C9A0}
.notes-card-blue{background:#EFF6FF;border-color:#93C5FD}
</style>
</head>

let activeGroup = "all";
let activePerson = "all";

// ============================================================
// RENDER: Show Order
// ============================================================
function renderOrder() {
  const gBtns = GROUPS.map(g=>`<button class="grp-btn${activeGroup===g.id?' active':''}" style="${activeGroup===g.id?`background:${g.color};border-color:${g.color};`:''}" onclick="setGroup('${g.id}')">${g.lbl}</button>`).join('');

  const grp = GROUPS.find(g=>g.id===activeGroup);
  const myActs = activeGroup==='all' ? [] : ACTS.filter(a=>a.groups.includes(activeGroup)||a.fmt==='Everyone').map(a=>a.num);

  const myActsNote = activeGroup!=='all' && myActs.length>0
    ? `<div class="alert alert-gold" style="margin-bottom:18px">Your group <strong>${grp.lbl}</strong> performs in act${myActs.length>1?'s':''}: <strong>${myActs.join(', ')}</strong> &nbsp;\u2014&nbsp; highlighted below with a gold bar</div>`
    : '';

  const rows = ACTS.map(a=>{
    const inGroup = activeGroup==='all' ? false : (a.groups.includes(activeGroup) || a.fmt==='Everyone');
    const badge = inGroup ? `<span class="your-badge" style="background:${grp.color};color:#fff">Your group</span>` : '';
    return `<tr class="${inGroup?'hl':''}">
      <td><span class="num" style="color:${inGroup?grp.color:'#d4c0e0'}">${a.num}</span></td>
      <td>
        <div style="font-weight:600;color:#1A1A1A">${a.performer}${a.star?' <span class="star">\u2605</span>':''}${badge}</div>
        ${a.note?`<div style="font-size:11px;color:#999999;margin-top:2px">${a.note}</div>`:''}
      </td>
      <td style="color:#6B6B6B">
        ${a.song||'\u2014'}
        ${a.photo&&PHOTOS[a.photo]&&PHOTOS[a.photo][0]
          ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${PHOTOS[a.photo].slice(0,2).map(b=>`<img src="data:image/jpeg;base64,${b}" style="width:75px;height:auto;border-radius:4px;object-fit:cover;box-shadow:0 1px 3px rgba(0,0,0,.2)">`).join('')}</div>`
          : ''}
      </td>
      <td><span class="chip ${a.fmt==='Everyone'?'chip-all':a.fmt.includes('Solo')?'chip-solo':'chip-group'}">${a.fmt}</span></td>
    </tr>`;
  }).join('');

  return `<div class="sec-title">Show Order</div>
<div class="sec-sub">18 acts &nbsp;&middot;&nbsp; Select your group to highlight your acts in the show</div>
<div class="grp-row">${gBtns}</div>
${myActsNote}
<div class="table-wrap"><table>
  <thead><tr><th style="width:44px">#</th><th>Performer / Group</th><th>Song</th><th>Format</th></tr></thead>
  <tbody>${rows}</tbody>
</table></div>`;
}

function setGroup(id){
  activeGroup = id;
  document.getElementById('content').innerHTML = renderOrder();
}

function setPerson(id){
  activePerson = id;
  document.getElementById('content').innerHTML = renderChangeGuide();
}

// ============================================================
// RENDER: Change Guide
// ============================================================
function renderChangeGuide() {
  const people = activePerson === 'all' ? PEOPLE : PEOPLE.filter(p => p.name === activePerson);
  const personBtns = ['all', ...PEOPLE.map(p=>p.name)].map(n => {
    const isAll = n === 'all';
    const lbl = isAll ? 'All' : n;
    const active = activePerson === n;
    const col = isAll ? '#6d28a0' : (PEOPLE.find(p=>p.name===n)||{color:'#6d28a0'}).color;
    return `<button onclick="setPerson('${n}')" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:2px solid ${col};background:${active?col:'transparent'};color:${active?'#fff':col};cursor:pointer;transition:all .2s">${lbl}</button>`;
  }).join('');

  const cards = people.map(p => {
    const actRows = p.acts.map((a, i) => {
      const changeBadge = a.change
        ? `<div style="margin:4px 0 0;padding:5px 10px;border-radius:6px;font-size:11px;background:${a.change.tight?'#FEF6EF':'#EDF5F1'};border:1px solid ${a.change.tight?'#C4581A':'#86CFAC'};color:${a.change.tight?'#7A3010':'#2D6A4F'}">
            ${a.change.tight?'⚠️ TIGHT — ':'✓ '}Change window: <strong>${a.change.window}</strong>
           </div>`
        : (a.sameAs ? `<div style="margin:4px 0 0;font-size:11px;color:#6B6B6B;font-style:italic">↑ Same costume as Act ${a.sameAs} — no change needed</div>` : '');

      return `<div style="display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid #f5eeff;align-items:flex-start${i===0?';background:#fdf8ff':''}">
        <div style="min-width:30px;height:30px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0">${a.num}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:#1A1A1A">${a.grp}</div>
          <div style="font-size:11px;color:#6B6B6B;margin-top:1px">Costume: ${a.costume}</div>
          ${a.note?`<div style="font-size:11px;color:#c07000;margin-top:2px;font-style:italic">${a.note}</div>`:''}
          ${changeBadge}
        </div>
      </div>`;
    }).join('');

    return `<div style="background:#fff;border:1px solid #E5DDD3;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:22px">
      <div style="padding:14px 16px;background:${p.color}18;border-bottom:2px solid ${p.color}40;display:flex;align-items:flex-start;gap:12px">
        <div style="min-width:42px;height:42px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0">${p.name.slice(0,2).toUpperCase()}</div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#1A1A1A">${p.name}</div>
          <div style="font-size:11px;color:${p.color};font-weight:600;margin-top:1px">${p.role}</div>
          <div style="font-size:12px;color:#7a5c8a;margin-top:4px">${p.note}</div>
        </div>
        <div style="margin-left:auto;text-align:right;flex-shrink:0">
          <div style="font-size:22px;font-weight:800;color:${p.color}">${p.acts.length}</div>
          <div style="font-size:10px;color:#6B6B6B;text-transform:uppercase;letter-spacing:.5px">acts</div>
        </div>
      </div>
      ${actRows}
    </div>`;
  }).join('');

  return `<div class="sec-title">Change Guide</div>
<div class="sec-sub">Costume change windows for students performing in multiple acts</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;padding:14px 16px;background:#fdf8ff;border-radius:10px;border:1px solid #e8d8f8">
  <span style="font-size:12px;font-weight:600;color:#6d28a0;align-self:center;margin-right:4px">Show my schedule:</span>
  ${personBtns}
</div>
<div class="alert alert-gold" style="margin-bottom:24px">
  ⏱ The golden rule: be in your <strong>next costume and ready backstage 2 acts before</strong> you perform.
  Check the boxes below to find your window. ⚠️ means the change window is very short — plan ahead!
</div>
${cards}
<div class="alert alert-purple" style="margin-top:4px">
  Not on this list? If you perform in only one act (or only in Bollyfolk), no costume change is needed.
  If you think you have a change window not shown here, speak to <strong>Swapnil</strong> before show day.
</div>
<div class="closing" style="margin-top:28px">
  <h3>A message from Swapnil, Wim &amp; the GIDF Team</h3>
  <p>Thank you for being part of Gent India Dans Festival 2026. You have worked incredibly hard, and tonight is your moment to shine. We are so proud of every single one of you. And for the first time you are doing some songs without me &mdash; Swapnil.</p>
  <p style="margin-top:12px">Dance with joy, support each other backstage, and enjoy every second on that stage. The audience cannot wait to see you.</p>
  <div class="sig">Swapnil Dagliya &nbsp;&middot;&nbsp; Wim &nbsp;&middot;&nbsp; The GIDF Team<br>
    <span style="color:#AAAAAA;font-weight:400;font-size:12px">Organised by <a href="https://abcdans.com" style="color:#C4581A;text-decoration:none" target="_blank">ABC</a> &middot; <a href="https://shoonyadance.com" style="color:#C4581A;text-decoration:none" target="_blank">Shoonya Dance Centre</a>, Ghent</span>
  </div>
</div>`;
}

// ============================================================
// NAVIGATION
// ============================================================
function show(btn, name) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('content');
  if(name==='order')  el.innerHTML = renderOrder();
  if(name==='reh')    el.innerHTML = renderRehearsal();
  if(name==='bring')  el.innerHTML = renderBring();
  if(name==='venue')  el.innerHTML = renderVenue();
  if(name==='change') el.innerHTML = renderChangeGuide();
}
document.getElementById('content').innerHTML = renderOrder();
</script>
